<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You ❤️</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- MUSIC -->
  <audio id="bgMusic" loop>
    <source src="Sagip.mp3" type="audio/mpeg">
  </audio>

  <!-- BACKGROUND -->
  <div class="background"></div>
  <div class="overlay"></div>

  <!-- PARTICLES -->
  <div class="hearts"></div>
  <div class="stars"></div>

  <!-- MUSIC BUTTON -->
  <button id="musicToggle" class="music-btn">
    🔊 Music
  </button>

  <!-- MAIN -->
  <main class="container">

    <!-- INTRO -->
    <section class="intro" id="intro">

      <div class="glass-card intro-card">

        <span class="top-tag">
          A Special Message ✨
        </span>

        <h1>
          Hey You ❤️
        </h1>

        <p>
          I made something special for you...
        </p>

        <button id="openBtn" class="main-btn">
          Open Message
        </button>

      </div>

    </section>

    <!-- MESSAGE -->
    <section class="message-section hidden" id="messageSection">

      <div class="glass-card message-card">

        <h2>
          To Someone Special 🌙
        </h2>

        <p class="typing" id="typingText"></p>

        <div class="spotify-box">

          <iframe
          style="border-radius:12px"
          src="https://open.spotify.com/embed/album/5HEC19abEhLQQ7IuNuKixV?utm_source=generator"
          width="100%"
          height="80"
          frameBorder="0"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
          </iframe>

        </div>

        <div class="footer-text">
          Made with ❤️ just for you.
        </div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
